name: Build GUI Installer

on:
  push:
    branches: [ feat/tauri-gui ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  RUSTFLAGS: "-C target-feature=+avx2,+bmi2 -C opt-level=3"
  CARGO_PROFILE_RELEASE_LTO: "fat"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
  NODE_ENV: "production"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Build OpenFang CLI
        run: cargo build --release -p openfang-cli
      - name: Copy openfang.exe
        run: |
          New-Item -ItemType Directory -Force -Path tauri-gui\src-tauri\backend
          Copy-Item target\release\openfang.exe tauri-gui\src-tauri\backend\
      - name: Sync agent templates
        run: |
          Remove-Item -Recurse -Force tauri-gui\agent-templates\* -ErrorAction SilentlyContinue
          Get-ChildItem agents -Directory | ForEach-Object {
            $src = Join-Path $_.FullName "agent.toml"
            if (Test-Path $src) {
              Copy-Item $src (Join-Path tauri-gui\agent-templates "$($_.Name).toml")
            }
          }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: cd tauri-gui && npm ci
      - name: Verify Tauri versions
        run: |
          Write-Output "=== Rust tauri crate ==="
          cargo tree -p openfang-tauri-gui -i tauri --depth 0
          Write-Output "=== NPM tauri packages ==="
          cd tauri-gui && npm ls @tauri-apps/api @tauri-apps/cli
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./tauri-gui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: OpenFang_GUI_Setup
          path: tauri-gui/src-tauri/target/release/bundle/nsis/*.exe